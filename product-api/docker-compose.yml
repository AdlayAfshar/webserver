services:
  api:
    build: .
    container_name: shop-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:1234@db:5432/shop
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: shop-db
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: shop
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: